name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PROOMPT_DISABLE_KEYCHAIN: "1"

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes_file="docs/releases/${tag}.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; leaving title/notes unchanged."
            exit 0
          fi

          args=("$tag" --draft --verify-tag --title "$tag")
          if [[ -f "$notes_file" ]]; then
            echo "Using curated release notes from ${notes_file}."
            args+=(--notes-file "$notes_file")
          else
            echo "No curated release notes found at ${notes_file}; using generated notes."
            args+=(--generate-notes)
          fi

          gh release create "${args[@]}"

  build-cli:
    name: CLI (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
            binary: proompt
          - name: macos
            os: macos-latest
            archive: tar.gz
            binary: proompt
          - name: windows-x86_64
            os: windows-2025
            archive: zip
            binary: proompt.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build CLI
        run: cargo build --release --package proompt-cli

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/release dist/package
          cp "target/release/${{ matrix.binary }}" dist/package/
          tar -czf "dist/release/proompt-cli-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" -C dist/package "${{ matrix.binary }}"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release, dist/package | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          Compress-Archive -Path "dist/package/${{ matrix.binary }}" -DestinationPath "dist/release/proompt-cli-${{ github.ref_name }}-${{ matrix.name }}.zip"

      - name: Upload CLI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber

  build-macos-app:
    name: macOS desktop app
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Validate macOS signing configuration
        env:
          PROOMPT_ENABLE_MACOS_SIGNING: ${{ secrets.PROOMPT_ENABLE_MACOS_SIGNING }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${PROOMPT_ENABLE_MACOS_SIGNING:-}" != "true" ]]; then
            echo "PROOMPT_MACOS_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
            echo "Developer ID signing is disabled; building unsigned macOS DMG."
            echo "This is expected while Developer ID signing is deferred. Set PROOMPT_ENABLE_MACOS_SIGNING=true plus complete Apple secrets to enable signing later."
            exit 0
          fi

          has_cert=false
          if [[ -n "${APPLE_CERTIFICATE:-}" || -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            has_cert=true
          fi

          has_api_notary=false
          if [[ -n "${APPLE_API_KEY:-}" || -n "${APPLE_API_ISSUER:-}" || -n "${APPLE_API_PRIVATE_KEY:-}" ]]; then
            has_api_notary=true
          fi

          has_password_notary=false
          if [[ -n "${APPLE_ID:-}" || -n "${APPLE_PASSWORD:-}" || -n "${APPLE_TEAM_ID:-}" ]]; then
            has_password_notary=true
          fi

          if [[ -z "${APPLE_CERTIFICATE:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "Partial Apple signing configuration detected." >&2
            echo "APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD are required for signed macOS releases." >&2
            echo "If signing is intentionally deferred, unset PROOMPT_ENABLE_MACOS_SIGNING or set it to anything other than true." >&2
            exit 1
          fi

          if [[ "$has_api_notary" == true ]]; then
            if [[ -z "${APPLE_API_KEY:-}" || -z "${APPLE_API_ISSUER:-}" || -z "${APPLE_API_PRIVATE_KEY:-}" ]]; then
              echo "Partial API-key notarization configuration detected." >&2
              echo "APPLE_API_KEY, APPLE_API_ISSUER, and APPLE_API_PRIVATE_KEY must all be set for API-key notarization." >&2
              echo "If signing is intentionally deferred, unset PROOMPT_ENABLE_MACOS_SIGNING or set it to anything other than true." >&2
              exit 1
            fi

            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
            chmod 600 "$key_path"
            echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          fi

          if [[ "$has_password_notary" == true ]]; then
            if [[ -z "${APPLE_ID:-}" || -z "${APPLE_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
              echo "Partial Apple ID notarization configuration detected." >&2
              echo "APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID must all be set for Apple ID notarization." >&2
              echo "If signing is intentionally deferred, unset PROOMPT_ENABLE_MACOS_SIGNING or set it to anything other than true." >&2
              exit 1
            fi
          fi

          if [[ "$has_api_notary" == false && "$has_password_notary" == false ]]; then
            echo "Notarization credentials are required for signed macOS releases." >&2
            echo "Set either APPLE_API_KEY/APPLE_API_ISSUER/APPLE_API_PRIVATE_KEY or APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID." >&2
            echo "If signing is intentionally deferred, unset PROOMPT_ENABLE_MACOS_SIGNING or set it to anything other than true." >&2
            exit 1
          fi

          echo "PROOMPT_MACOS_SIGNING_MODE=signed-notarized" >> "$GITHUB_ENV"
          echo "Apple signing and notarization secrets are configured."

      - name: Build unsigned Tauri app
        if: env.PROOMPT_MACOS_SIGNING_MODE == 'unsigned'
        working-directory: app
        run: bunx tauri build --ci --no-sign

      - name: Build signed and notarized Tauri app
        if: env.PROOMPT_MACOS_SIGNING_MODE == 'signed-notarized'
        working-directory: app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: bunx tauri build --ci

      - name: Verify signed and notarized app
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${PROOMPT_MACOS_SIGNING_MODE:-}" != "signed-notarized" ]]; then
            echo "Skipping signing verification for ${PROOMPT_MACOS_SIGNING_MODE:-unknown} macOS build."
            exit 0
          fi

          codesign --verify --deep --strict --verbose=2 target/release/bundle/macos/Proompt.app
          spctl --assess --type execute --verbose target/release/bundle/macos/Proompt.app
          xcrun stapler validate target/release/bundle/macos/Proompt.app
          xcrun stapler validate target/release/bundle/dmg/*.dmg

      - name: Report unsigned macOS build
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${PROOMPT_MACOS_SIGNING_MODE:-}" == "unsigned" ]]; then
            echo "::warning::macOS signing secrets are not configured. Published DMG will remain unsigned/not notarized. This is expected while Developer ID signing is deferred."
          fi

      - name: Upload desktop release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" target/release/bundle/dmg/*.dmg --clobber

  publish-release:
    name: Publish release
    needs: [build-cli, build-macos-app]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
