name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PROOMPT_DISABLE_KEYCHAIN: "1"

jobs:
  build-cli:
    name: CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
            binary: proompt
          - name: macos
            os: macos-latest
            archive: tar.gz
            binary: proompt
          - name: windows-x86_64
            os: windows-latest
            archive: zip
            binary: proompt.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build CLI
        run: cargo build --release --package proompt-cli

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/release dist/package
          cp "target/release/${{ matrix.binary }}" dist/package/
          tar -czf "dist/release/proompt-cli-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" -C dist/package "${{ matrix.binary }}"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release, dist/package | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          Compress-Archive -Path "dist/package/${{ matrix.binary }}" -DestinationPath "dist/release/proompt-cli-${{ github.ref_name }}-${{ matrix.name }}.zip"

      - name: Upload CLI release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/release/*

  build-macos-app:
    name: macOS desktop app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: app
        run: bunx tauri build

      - name: Upload desktop release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/bundle/dmg/*.dmg
