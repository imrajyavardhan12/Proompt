name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PROOMPT_DISABLE_KEYCHAIN: "1"

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes_file="docs/releases/${tag}.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; leaving title/notes unchanged."
            exit 0
          fi

          args=("$tag" --draft --verify-tag --title "$tag")
          if [[ -f "$notes_file" ]]; then
            echo "Using curated release notes from ${notes_file}."
            args+=(--notes-file "$notes_file")
          else
            echo "No curated release notes found at ${notes_file}; using generated notes."
            args+=(--generate-notes)
          fi

          gh release create "${args[@]}"

  build-cli:
    name: CLI (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
            binary: proompt
          - name: macos
            os: macos-latest
            archive: tar.gz
            binary: proompt
          - name: windows-x86_64
            os: windows-2025
            archive: zip
            binary: proompt.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build CLI
        run: cargo build --release --package proompt-cli

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/release dist/package
          cp "target/release/${{ matrix.binary }}" dist/package/
          tar -czf "dist/release/proompt-cli-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" -C dist/package "${{ matrix.binary }}"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release, dist/package | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          Compress-Archive -Path "dist/package/${{ matrix.binary }}" -DestinationPath "dist/release/proompt-cli-${{ github.ref_name }}-${{ matrix.name }}.zip"

      - name: Upload CLI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber

  build-macos-app:
    name: macOS desktop app
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: app
        run: bunx tauri build

      - name: Upload desktop release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" target/release/bundle/dmg/*.dmg --clobber

  publish-release:
    name: Publish release
    needs: [build-cli, build-macos-app]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
